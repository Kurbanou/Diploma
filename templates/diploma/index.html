<main>
  <div class="wrapper" style="max-width: 297mm">
    <div
      id="section-to-print"
      class="container"
      style="
        background-image: url({bg});
        background-size: contain;
        background-size: cover;
        width: 297mm;
        height: 210mm;
      "
    >
      <h1>{заголовок}</h1>
      <h2>{подзаголовок}</h2>
      <h3>Награждается:</h3>
      <div class="name field">{ФИО}</div>
      <div class="text field">{текст}</div>
      <div class="atribut">
        <div class="date">{дата}</div>
        <div class="signature"><div class="name">{подпись}</div></div>
      </div>
    </div>
  </div>
</main>
