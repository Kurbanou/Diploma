<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор грамот</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <table id="data-table">
      <thead>
        <tr>
          <th>ФИО</th>
          <th>Шаблон</th>
          <th>Поздравление</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="btns">
      <button id="add-row">➕ Добавить строку</button>
      <button id="print-all">🖨️ Распечатать всё</button>
    </div>

    <div
      id="preview-container"
      style="
        display: none;
        margin-top: 20px;
        border: 1px solid #ccc;
        padding: 10px;
      "
    ></div>

    <!-- Библиотеки -->
    <script src="https://unpkg.com/dom-to-image-more@2.9.0/dist/dom-to-image-more.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
      window.jsPDF = window.jspdf.jsPDF;
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Скрипты -->
    <script src="js/templateLoader.js"></script>
    <script src="js/tableManager.js"></script>

    <script src="js/app.js"></script>
  </body>
</html>
