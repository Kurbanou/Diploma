<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Генератор грамот</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Marck+Script&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Массовая генерация грамот</h1>

    <table id="data-table">
      <thead>
        <tr>
          <th>ФИО</th>
          <th>Шаблон</th>
          <th>Поздравление</th>
          <th>Управление</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button id="add-row">➕ Добавить строку</button>
    <button id="generate-pdf">📄 Сформировать PDF</button>
    <button id="preview-page">🔍 Предпросмотр</button>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
      window.jsPDF = window.jspdf.jsPDF;
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Скрипты -->
    <script src="js/tableManager.js"></script>
    <script src="js/templateLoader.js"></script>
    <script src="js/pdfGenerator.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
